name: build and deploy

on:
  push:
    branches: [main]
    paths:
      - 'Flask_App/**'

jobs:
  build:
     runs-on: ubuntu-latest
     steps: 
      - name: code checkout
        uses: actions/checkout@v3
        
      - name: run docker compose file
        run: docker compose up -d --wait --wait-timeout 60

      - name: Check container status
        run: docker compose ps
