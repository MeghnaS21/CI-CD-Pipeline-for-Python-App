name: Simple Python app pipeline

on: 
  push:
    branches: [main]
    

jobs:
  build:  
    runs-on:  ubuntu-latest
    
    steps:
      - name: Code Checkout
        uses: actions/checkout@v3
  
      - name: build docker image
        run: docker build -t simple_python_app:latest ./Simple_Python_App
        
  
      - run: |
          docker run simple_python_app:latest
          sleep 5
          docker logs test-container
          docker stop test-container
